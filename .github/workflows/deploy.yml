name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate products & static export
        env:
          NEXT_PUBLIC_BASE_PATH: /HCPetFashion
          NEXT_PUBLIC_SITE_URL: https://bonistudio.github.io/HCPetFashion
        run: npm run build

      - name: Verify export output
        run: |
          test -f out/index.html
          test -d out/products
          grep -q "HCPetFashion" out/index.html || true
          echo "Static export OK — $(find out -name '*.html' | wc -l) HTML files"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
